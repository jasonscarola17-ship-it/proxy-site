<!DOCTYPE html>
<html>
<head>
  <title>My Proxy</title>
</head>
<body>
  <h2>My Hybrid Proxy</h2>

  <input type="text" id="url" placeholder="https://example.com">
  <button onclick="go()">Go</button>

  <iframe id="frame" style="width:100%; height:90vh;"></iframe>

  <script>
    function go() {
      let url = document.getElementById("url").value;

      let proxyUrl = "https://REPLACE_THIS/proxy?url=" + encodeURIComponent(url);

      document.getElementById("frame").src = proxyUrl;
    }
  </script>
</body>
</html>
